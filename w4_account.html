<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="w4_account.css">
    <title>Document</title>
</head>
<body>
    <div id="body">

        <div id="acc-content">
            <h3>We solve digital problems with an outstanding creative flare</h3>
            <p>We have created a new product that will help designers, developers and companies create websites for their startups quickly and easily.</p>
        </div>

        <div id="account">
            <div id="before-signin">
                <div id="signinOptions">
                <div id="signup">
                    <a href=""><button>SIGN UP</button></a>
                </div>
                <div id="login">
                    <a href=""><button>LOGIN</button></a>
                </div>
                </div>
                <div>
                    <input type="text" placeholder="Your email" id="email">
                </div>
                <div>
                    <input type="text" placeholder="Your password" id="password">
                </div>
                <div>
                    <button id="creation" onclick="createAccount()">Create an Account</button>
                </div>
                <div class="divider">
                    <hr>
                    <span>or</span>
                    <hr>
                </div>
                <div>
                    <button id="twitter-login" onclick="twitterLogin()">Login via Twitter</button>
                </div>
            </div>
            <p id="after-signin"></p>
            
        </div>
    </div>
    <script src="w4.js"></script>
</body>
</html>
